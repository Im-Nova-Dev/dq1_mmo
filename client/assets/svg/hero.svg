  <rect x="17" y="18" width="5" height="8" fill="#a8b0c0"/>
  <!-- body -->
  <rect x="9" y="12" width="14" height="8" rx="1" fill="#c0c8d8"/>
  <rect x="11" y="13" width="10" height="5" fill="#e8ecf4"/>
  <!-- arms -->
  <rect x="6" y="13" width="3" height="7" fill="#c0c8d8"/>
